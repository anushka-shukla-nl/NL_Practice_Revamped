document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d-green-text:   #0a7d41;  /* accessible green-on-white */\n  --brand-green-tint:   #005353;\n\n  /* ---------- Semantic / iOS-like accents (Light) ---------- */\n  --c-green:  #34c759;\n  --c-yellow: #ffcc00;\n  --c-red:    #ff3b30;\n  --c-orange: #ff9500;\n  --c-sky:    #48a3f7;\n  --c-blue:   #007aff;\n  --c-pink:   #ff2d55;\n  --c-lilac:  #af52de;\n  --c-rose:   #f36b83;\n  --c-teal:   #21d3f3;\n\n  /* ---------- Warm neutrals (imagery / mast-head fills) ---------- */\n  --c-almond: #FCE7CF;\n  --c-cream:  #FEF3E7;\n\n  /* ---------- Tag palette (Light) ---------- */\n  --tag-green:      #96D9A7;\n  --tag-yellow:     #FFE561;\n  --tag-red:        #FBA5A0;\n  --tag-orange:     #FFBC53;\n  --tag-blue:       #86C2FF;\n  --tag-pink:       #F4AAFB;\n  --tag-purple:     #CAA9FF;\n  --tag-light-blue: #8DDDEB;\n\n  /* Soft course-card tag bg from odin */\n  --tag-soft-green: #d0eabe;\n  --tag-soft-cream: #fefaf1; /* wall of praise bg */\n\n  /* Marketing-specific: used on dark BGs */\n  --marketing-green: #408B6C;\n\n  /* ---------- Radii / shadows / spacing ---------- */\n  --radius-sm: 4px;\n  --radius:    8px;           /* canonical — cards, buttons, inputs */\n  --radius-lg: 12px;\n  --radius-pill: 100px;\n\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);\n  --shadow:    0 2px 8px rgba(0,0,0,0.08);\n  --shadow-lg: 0 10px 40px -10px rgba(0,0,0,0.20);\n  --shadow-glow-green: 0 10px 40px -10px #2af77355;\n\n  /* Content gutters */\n  --gutter-desktop: 64px;\n  --gutter-mobile:  24px;\n  --max-content:    1200px;\n\n  /* ---------- Semantic typography tokens (Default / App-side, desktop) ---------- */\n  --h1-size: 42px;   --h1-lh: 114%; --h1-ls: -3.35px;\n  --h2-size: 35px;   --h2-lh: 120%; --h2-ls: -2.8px;\n  --h3-size: 30px;   --h3-lh: 125%; --h3-ls: -2.5px;\n  --h4-size: 22px;   --h4-lh: 128%; --h4-ls: -2.25px;\n  --h5-size: 19px;   --h5-lh: 145%; --h5-ls: 0.15px;\n  --h6-size: 19px;   --h6-lh: 145%; --h6-ls: 0.15px;\n\n  --body1-size: 17px; --body1-lh: 160%; --body1-ls: (--bg-default);\n  color: var(--fg-primary);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-feature-settings: \"liga\" off;\n  margin: 0;\n}\nh5, h6 { font-family: var(--font-body); font-weight: 400; margin: 0; }\n\nh1 { font-size: var(--h1-size); line-height: var(--h1-lh); letter-spacing: var(--h1-ls); }\nh2 { font-size: var(--h2-size); line-height: var(--h2-lh); letter-spacing: var(--h2-ls); }\nh3 { font-size: var(--h3-size); line-height: var(--h3-lh); letter-spacing: var(--h3-ls); }\nh4 { font-size: var(--h4-size); line-height: var(--h4-lh); letter-spacing: var(--h4-ls); }\nh5 { font-size: var(--h5-size); line-height: var(--h5-lh); letter-spacing: var(--h5-ls); }\nh6 { font-size: var(--h6-size); line-height: var(--h6-lh); letter-spacing: var(--h6-ls); }\n\np, .body1 { font: 400 var(--body1-size)/var(--body1-lh) var(--font-body); letter-spacing: var(--body1-ls); margin: 0; }\n.body2    { font: 400 var(--body2-size)/var(--body2-lh) var(--font-body); letter-spacing: var(--body2-ls); }\n.caption  { font: 400 var(--caption-size)/var(--caption-lh) var(--font-body); }\n.overline { font: 400 var(--overline-size)/var(--overline-lh) var(--font-body); text-transform: uppercase; letter-spacing: 1px; }\n.tag      { font: 400 var(--tag-size)/var(--tag-lh) var(--font-body); }\n\ncode, pre { font-family: var(--font-mono); }\n\n/* Marketing / hero scale — use on landing pages */\n.display-1 { font: 400 72px/100% var(--font-display); letter-spacing: -8.7px; }\n.display-2 { font: 400 54px/100% var(--font-display); letter-spacing: -6.2px; }\n.display-3 { font: 400 40px/100% var(--font-display); letter-spacing: -4px; }\n\n/* Buttons */\n.btn {\n  font: 500 var(--btn-lg-size)/var(--btn-lg-lh) var(--font-body);\n  letter-spacing: var(--btn-lg-ls);\n  padding: 12px 20px;\n  border-radius: var(--radius);\n  cursor: pointer;\n  border: none;\n  display: inline-flex; align-items: center; gap: 8px;\n  transition: opacity 120ms ease, transform 120ms ease, background-color 120ms ease;\n}\n.btn:hover { opacity: 0.92; }\n.btn:active { transform: scale(0.98); }\n.btn-primary   { background: var(--cta-primary-bg); color: var(--cta-primary-fg); }\n.btn-secondary { background: var(--cta-secondary-bg); color: var(--cta-secondary-fg); }\n.btn-outline   { background: transparent; color: var(--fg-primary); border: 1px solid var(--fg-primary); }\n.btn-small     { font-size: var(--btn-sm-size); line-height: var(--btn-sm-lh); letter-spacing: var(--btn-sm-ls); padding: 8px 14px; }\n\n/* Mobile scale overrides */\n@media (max-width: 768px) {\n  :root {\n    --h1-size: 31px; --h1-ls: -3.35px; --h1-lh: 110%;\n    --h2-size: 27px; --h2-ls: -2.8px;  --h2-lh: 114%;\n    --h3-size: 24px; --h3-ls: -2px;    --h3-lh: 118%;\n    --h4-size: 22px; --h4-ls: -2px;\n    --gutter-desktop: 24px;\n  }\n  .display-1 { font-size: 42px; letter-spacing: -5px; }\n  .display-2 { font-size: 35px; letter-spacing: -4.1px; }\n  .display-3 { font-size: 29px; letter-spacing: -3px; }\n}\n<\u002Fstyle>\n  <style>/* ==========================================================================\n   NextLeap Design System — Colors & Type\n   Source: odin/src/styles/ThemeVariables.ts, DefaultStyleTemplates.ts,\n           MarketingStyleTemplates.ts, Colors.tsx\n   ========================================================================== */\n\n/* ---------- Webfonts (Google Fonts) ------------------------------------- */\n/* vietnamese */\n@font-face {\n  font-family: 'Lexend Deca';\n  font-style: normal;\n  font-weight: 300;\n  font-display: swap;\n  src: url(\"c4de0173-8229-45c6-a367-6efc810741ba\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Lexend Deca';\n  font-style: normal;\n  font-weight:         #ffffff;\n  --bg-card:         #ffffff;\n  --bg-overlay:      rgba(203,203,203,0.80);\n\n  /* ---------- Foreground / Text (Light) ---------- */\n  --fg-primary:    rgba(0,0,0,0.96);\n  --fg-secondary:  rgba(0,0,0,0.75);\n  --fg-tertiary:   rgba(0,0,0,0.60);\n  --fg-disabled:   rgba(0,0,0,0.40);\n  --fg-on-dark:    rgba(255,255,255,1);\n\n  /* ---------- Borders / Dividers ---------- */\n  --border:       #E5E5E5;\n  --separator:    #000000;\n  --divider:      rgba(26,26,26,0.10);\n\n  /* ---------- Brand & CTAs ---------- */\n  --cta-primary-bg:   #21c45b;    /* NextLeap green */\n  --cta-primary-fg:   #ffffff;\n  --cta-secondary-bg: #0c0c0c;    /* Near-black */\n  --cta-secondary-fg: #ffffff;\n\n  --brand-green:        #21c45b;  /* primary */\n  --brand-green-bright: #2af773;  /* dark-mode accent, also \"primary_green\" in light */\n  --brand-green-text:   #0a7d41;  /* accessible green-on-white */\n  --brand-green-tint:   #005353;\n\n  /* ---------- Semantic / iOS-like accents (Light) ---------- */\n  --c-green:  #34c759;\n  --c-yellow: #ffcc00;\n  --c-red:    #ff3b30;\n  --c-orange: #ff9500;\n  --c-sky:    #48a3f7;\n  --c-blue:   #007aff;\n  --c-pink:   #ff2d55;\n  --c-lilac:  #af52de;\n  --c-rose:   #f36b83;\n  --c-teal:   #21d3f3;\n\n  /* ---------- Warm neutrals (imagery / mast-head fills) ---------- */\n  --c-almond: #FCE7CF;\n  --c-cream:  #FEF3E7;\n\n  /* ---------- Tag palette (Light) ---------- */\n  --tag-green:      #96D9A7;\n  --tag-yellow:     #FFE561;\n  --tag-red:        #FBA5A0;\n  --tag-orange:     #FFBC53;\n  --tag-blue:       #86C2FF;\n  --tag-pink:       #F4AAFB;\n  --tag-purple:     #CAA9FF;\n  --tag-light-blue: #8DDDEB;\n\n  /* Soft course-card tag bg from odin */\n  --tag-soft-green: #d0eabe;\n  --tag-soft-cream: #fefaf1; /* wall of praise bg */\n\n  /* Marketing-specific: used on dark BGs */\n  --marketing-green: #408B6C;\n\n  /* ---------- Radii / shadows / spacing ---------- */\n  --radius-sm: 4px;\n  --radius:    8px;           /* canonical — cards, buttons, inputs */\n  --radius-lg: 12px;\n  --radius-pill: 100px;\n\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);\n  --shadow:    0 2px 8px rgba(0,0,0,0.08);\n  --shadow-lg: 0 10px 40px -10px rgba(0,0,0,0.20);\n  --shadow-glow-green: 0 10px 40px -10px #2af77355;\n\n  /* Content gutters */\n  --gutter-desktop: 64px;\n  --gutter-mobile:  24px;\n  --max-content:    1200px;\n\n  /* ---------- Semantic typography tokens (Default / App-side, desktop) ---------- */\n  --h1-size: 42px;   --h1-lh: 114%; --h1-ls: -3.35px;\n  --h2-size: 35px;   --h2-lh: 120%; --h2-ls: -2.8px;\n  --h3-size: 30px;   --h3-lh: 125%; --h3-ls: -2.5px;\n  --h4-size: 22px;   --h4-lh: 128%; --h4-ls: -2.25px;\n  --h5-size: 19px;   --h5-lh: 145%; --h5-ls: 0.15px;\n  --h6-size: 19px;   --h6-lh: 145%; --h6-ls: 0.15px;\n\n  --body1-size: 17px; --body1-lh: 160%; --body1-ls: 0.25px;\n  --body2-size: 15px; --body2-lh: 160%; --body2-ls: 0.25px;\n  --caption-size: 13px; --caption-lh: 150%;\n  --overline-size: 11px; --overline-lh: 100%;\n  --tag-size: 12px; --tag-lh: 110%;\n\n  --btn-lg-size: 17px;  --btn-lg-lh: 118%; --btn-lg-ls: 0.5px;\n  --btn-sm-size: 15px;  --btn-sm-lh: 134%; --btn-sm-ls: 0.25px;\n}\n\n/* ================= Dark theme ==================== */\n[data-theme=\"dark\"], .theme-dark {\n  --bg-default:    #0c0c0c;\n  --bg-primary:    #0c0c0c;\n  --bg-secondary:  #141414;\n  --bg-tertiary:   #1f1f1f;\n  --bg-quaternary: rgba(255,255,255,0.30);\n  --bg-quaternary-light: rgba(255,255,255,0.05);\n  --bg-input:      #2e2e2e;\n  --bg-card:       #1f1f1f;\n  --bg-overlay:    rgba(40,40,40,0.90);\n\n  --fg-primary:    rgba(255,255,255,1);\n  --fg-secondary:  rgba(255,255,255,0.75);\n  --fg-tertiary:   rgba(255,255,255,0.60);\n  --fg-disabled:   rgba(255,255,255,0.40);\n  --fg-on-dark:    rgba(255,255,255,1);\n\n  --border:     rgba(255,255,255,0.10);\n  --separator:  rgba(255,255,255,0.10);\n  --divider:    rgba(255,255,255,0.10);\n\n  --cta-primary-bg:   #2af773;\n  --cta-primary-fg:   rgba(0,0,0,0.96);\n  --cta-secondary-bg: #ffffff;\n  --cta-secondary-fg: rgba(0,0,0,0.96);\n\n  --brand-green-text: #2af773;\n\n  /* iOS-like accents shift for dark */\n  --c-green:  #30d158;\n  --c-yellow: #ffd60a;\n  --c-red:    #ff453a;\n  --c-orange: #ff9f0a;\n  --c-sky:    #61aff7;\n  --c-blue:   #0a84ff;\n  --c-pink:   #ff375f;\n  --c-lilac:  #bf5af2;\n\n  --c-almond: #544845;\n  --c-cream:  #73635F;\n\n  --tag-green:      #42764F;\n  --tag-yellow:     #E1BC00;\n  --tag-red:        #8F2620;\n  --tag-orange:     #CA8519;\n  --tag-blue:       #094887;\n  --tag-pink:       #861F70;\n  --tag-purple:     #601F80;\n  --tag-light-blue: #008299;\n\n  --marketing-green: #B5E09B;\n}\n\n/* ================= Base / semantic element styles ================ */\nhtml { font-size: 17px; }\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  background: var(--bg-default);\n  color: var(--fg-primary);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-feature-settings: \"liga\" off;\n  margin: 0;\n}\nh5, h6 { font-family: var(--font-body); font-weight: 400; margin: 0; }\n\nh1 { font-size: var(--h1-size); line-height: var(--h1-lh); letter-spacing: var(--h1-ls); }\nh2 { font-size: var(--h2-size); line-height: var(--h2-lh); letter-spacing: var(--h2-ls); }\nh3 { font-size: var(--h3-size); line-height: var(--h3-lh); letter-spacing: var(--h3-ls); }\nh4 { font-size: var(--h4-size); line-height: var(--h4-lh); letter-spacing: var(--h4-ls); }\nh5 { font-size: var(--h5-size); line-height: var(--h5-lh); letter-spacing: var(--h5-ls); }\nh6 { font-size: var(--h6-size); line-height: var(--h6-lh); letter-spacing: var(--h6-ls); }\n\np, .body1 { font: 400 var(--body1-size)/var(--body1-lh) var(--font-body); letter-spacing: var(--body1-ls); margin: 0; }\n.body2    { font: 400 var(--body2-size)/var(--body2-lh) var(--font-body); letter-spacing: var(--body2-ls); }\n.caption  { font: 400 var(--caption-size)/var(--caption-lh) var(--font-body); }\n.overline { font: 400 var(--overline-size)/var(--overline-lh) var(--font-body); text-transform: uppercase; letter-spacing: 1px; }\n.tag      { font: 400 var(--tag-size)/var(--tag-lh) var(--font-body); }\n\ncode, pre { font-family: var(--font-mono); }\n\n/* Marketing / hero scale — use on landing pages */\n.display-1 { font: 400 72px/100% var(--font-display); letter-spacing: -8.7px; }\n.display-2 { font: 400 54px/100% var(--font-display); letter-spacing: -6.2px; }\n.display-3 { font: 400 40px/100% var(--font-display); letter-spacing: -4px; }\n\n/* Buttons */\n.btn {\n  font: 500 var(--btn-lg-size)/var(--btn-lg-lh) var(--font-body);\n  letter-spacing: var(--btn-lg-ls);\n  padding: 12px 20px;\n  border-radius: var(--radius);\n  cursor: pointer;\n  border: none;\n  display: inline-flex; align-items: center; gap: 8px;\n  transition: opacity 120ms ease, transform 120ms ease, background-color 120ms ease;\n}\n.btn:hover { opacity: 0.92; }\n.btn:active { transform: scale(0.98); }\n.btn-primary   { background: var(--cta-primary-bg); color: var(--cta-primary-fg); }\n.btn-secondary { background: var(--cta-secondary-bg); color: var(--cta-secondary-fg); }\n.btn-outline   { background: transparent; color: var(--fg-primary); border: 1px solid var(--fg-primary); }\n.btn-small     { font-size: var(--btn-sm-size); line-height: var(--btn-sm-lh); letter-spacing: var(--btn-sm-ls); padding: 8px 14px; }\n\n/* Mobile scale overrides */\n@media (max-width: 768px) {\n  :root {\n    --h1-size: 31px; --h1-ls: -3.35px; --h1-lh: 110%;\n    --h2-size: 27px; --h2-ls: -2.8px;  --h2-lh: 114%;\n    --h3-size: 24px; --h3-ls: -2px;    --h3-lh: 118%;\n    --h4-size: 22px; --h4-ls: -2px;\n    --gutter-desktop: 24px;\n  }\n  .display-1 { font-size: 42px; letter-spacing: -5px; }\n  .display-2 { font-size: 35px; letter-spacing: -4.1px; }\n  .display-3 { font-size: 29px; letter-spacing: -3px; }\n}\n<\u002Fstyle>\n  <script src=\"ea8e0ff7-5d2a-49a4-920b-0f7beeb86fe8\"><\u002Fscript>\n  <script src=\"f984b09e-d616-420f-a79e-6082fa62a6ee\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;}\n    svg[class*=\"lucide\"]{width:1em;height:1em;stroke-width:2;}\n    button{font-family:var(--font-body);}\n    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}\n    @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}\n    @keyframes popIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}\n    ::-webkit-scrollbar{width:10px;height:10px;}\n    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.16);border-radius:6px;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex;min-height:100vh;background:#fff;font-family:var(--font-body);color:var(--fg-primary);\">\n\n  <aside style=\"position:sticky;top:0;align-self:flex-start;height:100vh;width:266px;flex:none;border-right:1px solid var(--border);display:flex;flex-direction:column;padding:22px 16px;background:#fff;\">\n    <div style=\"padding:0 6px 18px;\">\n      <div style=\"font-family:var(--font-display);font-size:19px;line-height:1.25;letter-spacing:-1px;\">{{ programName }}<\u002Fdiv>\n      <div class=\"caption\" style=\"color:var(--fg-tertiary);margin-top:6px;\">{{ dates }}<\u002Fdiv>\n    <\u002Fdiv>\n    <nav style=\"display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto;\">\n      <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"13\">\n        <button style=\"{{ item.style }}\" onclick=\"{{ item.onClick }}\">\n          <span style=\"display:contents\"><i data-lucide=\"{{ item.icon }}\" style=\"font-size:19px;flex:none;\"><\u002Fi><\u002Fspan>\n          <span style=\"flex:1;\">{{ item.label }}<\u002Fspan>\n          <sc-if value=\"{{ item.badge }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"flex:none;width:8px;height:8px;border-radius:50%;background:#21c45b;box-shadow:0 0 0 3px rgba(33,196,91,.2);\"><\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 6px 0;border-top:1px solid var(--border);margin-top:8px;\">\n      <span style=\"font-family:var(--font-display);font-size:18px;letter-spacing:-1px;\">nextleap<\u002Fspan>\n      <span style=\"width:30px;height:30px;border-radius:50%;background:#dcdcdc;display:inline-block;\"><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main style=\"flex:1;min-width:0;display:flex;flex-direction:column;\">\n    <div style=\"position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--border);padding:22px 40px 0;\">\n      <h4 style=\"margin:0 0 14px;\">{{ headerTitle }}<\u002Fh4>\n      <sc-if value=\"{{ isPractice }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;gap:30px;\">\n          <button onclick=\"{{ goChallengesTab }}\" style=\"{{ tabChallengesStyle }}\"><span style=\"display:contents\"><i data-lucide=\"clipboard-list\" style=\"font-size:18px;\"><\u002Fi><\u002Fspan> Challenges<\u002Fbutton>\n          <button onclick=\"{{ goTopicsTab }}\" style=\"{{ tabTopicsStyle }}\"><span style=\"display:contents\"><i data-lucide=\"layers\" style=\"font-size:18px;\"><\u002Fi><\u002Fspan> Topics<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ notPractice }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"height:14px;\"><\u002Fdiv><\u002Fsc-if>\n    <\u002Fdiv>\n\n    <div style=\"padding:28px 40px 90px;max-width:1180px;width:100%;\">\n\n      <sc-if value=\"{{ isPracticeChallenges }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"display:flex;flex-direction:column;gap:22px;\">\n          <div>\n            <h3 style=\"margin:0 0 8px;\">Daily Practice Challenge<\u002Fh3>\n            <div style=\"display:flex;align-items:flex-start;gap:9px;color:var(--fg-secondary);font-size:14px;line-height:1.55;max-width:760px;\">\n              <span style=\"display:contents\"><i data-lucide=\"alarm-clock\" style=\"font-size:18px;color:#d98300;flex:none;margin-top:3px;\"><\u002Fi><\u002Fspan>\n              <div><strong style=\"color: var(--fg-primary);\">A quick heads-up: your streak resets at midnight.<\u002Fstrong> If you miss a day your streak goes back to 0 unless a streak freeze covers it. Sessions expire after 15 minutes of inactivity.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1.35fr;gap:18px;\">\n            <div style=\"background:#faf4c9;border-radius:12px;padding:22px 24px;text-align:center;\">\n              <div style=\"color:#7a6a17;font-size:15px;margin-bottom:10px;\">Current Streak<\u002Fdiv>\n              <div style=\"font-family:var(--font-display);font-size:42px;line-height:1;\">{{ currentStreak }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#faf4c9;border-radius:12px;padding:22px 24px;text-align:center;\">\n              <div style=\"color:#7a6a17;font-size:15px;margin-bottom:10px;\">Max Streak<\u002Fdiv>\n              <div style=\"font-family:var(--font-display);font-size:42px;line-height:1;\">{{ maxStreak }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid var(--border);border-radius:12px;padding:18px 22px;\">\n              <div style=\"font-weight:600;font-size:16px;margin-bottom:12px;\">Upcoming Rewards<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px;\">\n                <sc-for list=\"{{ upcoming }}\" as=\"u\" hint-placeholder-count=\"2\">\n                  <div style=\"display:flex;align-items:center;gap:10px;font-size:15px;color:var(--fg-secondary);\"><span style=\"display:contents\"><i data-lucide=\"trophy\" style=\"font-size:18px;color:#e0a800;flex:none;\"><\u002Fi><\u002Fspan>{{ u.label }}<\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#eaf1ec;border-radius:14px;padding:30px;\">\n            <div style=\"display:grid;grid-template-columns:repeat(10,44px);gap:18px;justify-content:space-between;\">\n              <sc-for list=\"{{ days }}\" as=\"cell\" hint-placeholder-count=\"40\">\n                <div style=\"{{ cell.style }}\" onclick=\"{{ cell.onClick }}\" title=\"{{ cell.title }}\">\n                  <sc-if value=\"{{ cell.isDone }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"display:contents\"><i data-lucide=\"check\" style=\"font-size:20px;\"><\u002Fi><\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ cell.isFrozen }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"display:contents\"><i data-lucide=\"snowflake\" style=\"font-size:18px;\"><\u002Fi><\u002Fspan><\u002Fsc-if>\n                  <sc-if value=\"{{ cell.isNum }}\" hint-placeholder-val=\"{{ false }}\">{{ cell.n }}<\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;\">\n            <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n              <sc-if value=\"{{ hasToday }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ solveToday }}\" style=\"font-weight:600;font-size:16px;padding:14px 26px;border-radius:10px;border:none;cursor:pointer;background:#111;color:#fff;\">Start Today's Challenge<\u002Fbutton>\n              <\u002Fsc-if>\n              <button onclick=\"{{ openRewards }}\" style=\"font-weight:600;font-size:16px;padding:14px 26px;border-radius:10px;border:1px solid #111;background:#fff;color:#111;cursor:pointer;display:inline-flex;align-items:center;gap:8px;\"><span style=\"display:contents\"><i data-lucide=\"gift\" style=\"font-size:18px;\"><\u002Fi><\u002Fspan> My Rewards<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isPracticeTopics }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"max-width:1000px;\">\n          <h3 style=\"margin:0 0 6px;\">Practice specific topics<\u002Fh3>\n          <p style=\"color:var(--fg-tertiary);font-size:15px;margin-bottom:22px;\">Targeted question sets to sharpen a single skill.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n            <sc-for list=\"{{ topics }}\" as=\"t\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:16px;border:1px solid var(--border);border-radius:8px;padding:18px;cursor:pointer;\">\n                <div style=\"{{ t.tileStyle }}\"><span style=\"display:contents\"><i data-lucide=\"{{ t.icon }}\" style=\"font-size:28px;\"><\u002Fi><\u002Fspan><\u002Fdiv>\n                <div style=\"font-weight:600;font-size:16px;line-height:1.25;\">{{ t.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isTasks }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;flex-direction:column;gap:14px;max-width:900px;\">\n          <div style=\"display:flex;align-items:flex-start;gap:9px;color:var(--fg-secondary);font-size:14px;line-height:1.5;margin-bottom:4px;\">\n            <span style=\"display:contents\"><i data-lucide=\"sparkles\" style=\"font-size:18px;color:#caa400;flex:none;margin-top:2px;\"><\u002Fi><\u002Fspan>\n            <div>Modules you unlock from streak rewards appear right here in your curriculum, marked with a <strong style=\"color:var(--fg-primary);\">Reward<\u002Fstrong> tag.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;border:1px solid <\u002Fdiv>\n\n          <div style=\"border-top:1px solid var(--border);padding-top:22px;\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;\">\n              <h4 style=\"margin:0;\">Streak<\u002Fh4>\n              <span style=\"display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--fg-tertiary);\"><span style=\"display:contents\"><i data-lucide=\"zap\" style=\"font-size:13px;\"><\u002Fi><\u002Fspan> No action needed<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:12px;\">\n              <sc-for list=\"{{ autoRewards }}\" as=\"r\" hint-placeholder-count=\"1\">\n                <div style=\"display:flex;gap:16px;align-items:center;border:1px solid var(--border);border-radius:10px;padding:16px 18px;background:#fafbfc;\">\n                  <div style=\"{{ r.iconStyle }}\"><span style=\"display:contents\"><i data-lucide=\"{{ r.icon }}\" style=\"font-size:24px;\"><\u002Fi><\u002Fspan><\u002Fdiv>\n                  <div style=\"flex:1;min-width:0;\">\n                    <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap;\">\n                      <span style=\"font-weight:600;font-size:16px;\">{{ r.title }}<\u002Fspan>\n                      <span style=\"{{ r.statusStyle }}\">{{ r.status }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"color:var(--fg-tertiary);font-size:14px;line-height:1.45;\">{{ r.note }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:none;\">\n                    <span style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-tertiary);border:1px solid var(--border);padding:8px 12px;border-radius:8px;white-space:nowrap;background:#fff;\"><span style=\"display:contents\"><i data-lucide=\"zap\" style=\"font-size:13px;\"><\u002Fi><\u002Fspan> Automatic<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ lipModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeLipModal }}\" style=\"position:fixed;inset:0;background:rgba(20,20,20,.5);display:flex;align-items:center;justify-content:center;padding:30px;z-index:55;animation:overlayIn .2s ease;\">\n      <div onclick=\"{{ stop }}\" style=\"background:#fff;border-radius:14px;width:100%;max-width:620px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;animation:popIn .25s ease;\">\n        <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding:22px 24px 18px;border-bottom:1px solid var(--border);\">\n          <div style=\"display:flex;align-items:center;gap:13px;\">\n            <div style=\"width:46px;height:46px;border-radius:10px;background:#eaf1ec;color:#103D2C;display:flex;align-items:center;justify-content:center;flex:none;\"><span style=\"display:contents\"><i data-lucide=\"megaphone\" style=\"font-size:24px;\"><\u002Fi><\u002Fspan><\u002Fdiv>\n            <div><div style=\"font-weight:600;font-size:18px;\">Learn in Public<\u002Fdiv><div style=\"font-size:13px;color:var(--fg-tertiary);margin-top:2px;\">Rules, how to post &amp; caption tips<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeLipModal }}\" style=\"border:1px solid var(--border);background:#fff;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;\"><span style=\"display:contents\"><i data-lucide=\"x\" style=\"font-size:18px;\"><\u002Fi><\u002Fspan><\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px 24px 0;\">\n          <div style=\"display:flex;gap:6px;background:#f3f3f3;border-radius:10px;padding:5px;\">\n            <button onclick=\"{{ goLipModalDetails }}\" style=\"{{ lipModalTabDetails }}\">Details<\u002Fbutton>\n            <button onclick=\"{{ goLipModalPolicy }}\" style=\"{{ lipModalTabPolicy }}\">Policy<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px 24px;overflow:auto;flex:1;\">\n          <sc-if value=\"{{ showLipModalDetails }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"font-size:15px;line-height:1.6;color:var(--fg-secondary);display:flex;flex-direction:column;gap:16px;\">\n              <div style=\"display:flex;align-items:flex-start;gap:11px;background:#e7f7ee;border:1px solid #b6e3c9;border-radius:10px;padding:14px 16px;color:var(--fg-secondary);\">\n                <span style=\"display:contents\"><i data-lucide=\"gift\" style=\"font-size:19px;color:#0a7d41;flex:none;margin-top:2px;\"><\u002Fi><\u002Fspan>\n                <div>Complete the challenge and you'll get a <strong style=\"color:var(--fg-primary);\">10% scholarship as a refund on your course fee<\u002Fstrong> — on top of the portfolio boost.<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"margin:0;\">Welcome to the <strong style=\"color:var(--fg-primary);\">Learn in Public (LIP) challenge<\u002Fstrong>, where you get an opportunity to go the extra mile to:<\u002Fp>\n              <ul style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:6px;\"><li>Apply your learnings,<\u002Fli><li>Boost your portfolio,<\u002Fli><li>Share your work with your network, and<\u002Fli><li>Build a brand for yourself.<\u002Fli><\u002Ful>\n              <div><h4 style=\"margin:0 0 6px;color:var(--fg-primary);\">What do you need to do?<\u002Fh4><p style=\"margin:0;\">Complete a total of four challenges over seven weeks, showcasing your work on the given prompts. Each challenge is explained in depth on its milestone.<\u002Fp><\u002Fdiv>\n              <div><h4 style=\"margin:0 0 6px;color:var(--fg-primary);\">Why are we doing this?<\u002Fh4><p style=\"margin:0;\">Curiosity, writing and storytelling are superpowers for a Product Manager. Practising these skills makes you a better PM and boosts your product portfolio — giving recruiters valuable insight into your abilities and helping you stand out in the job market.<\u002Fp><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ showLipModalPolicy }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"font-size:15px;line-height:1.6;color:var(--fg-secondary);display:flex;flex-direction:column;gap:18px;\">\n              <div>\n                <h4 style=\"margin:0 0 10px;color:var(--fg-primary);display:flex;align-items:center;gap:8px;\"><span style=\"display:contents\"><i data-lucide=\"shield-check\" style=\"font-size:19px;color:#103D2C;\"><\u002Fi><\u002Fspan> Eligibility criteria<\u002Fh4>\n                <ul style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:7px;\">\n                  <li>Add \"PM Fellow at NextLeap\" to your LinkedIn profile.<\u002Fli>\n                  <li>Post your work with the correct post number (e.g. 1/4).<\u002Fli>\n                  <li>Tag the NextLeap account and use #NextLeapPMFellowship.<\u002Fli>\n                  <li>Share the post link on the portal every week, under the assigned task.<\u002Fli>\n                  <li>All submissions must be posted before the scheduled deadlines on the portal.<\u002Fli>\n                  <li>Only Indian nationals with an Indian bank account in their own name are eligible for the scholarship refund.<\u002Fli>\n                  <li>This challenge is for individual participation only — please don't collaborate with others on it.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n              <div>\n                <h4 style=\"margin:0 0 10px;color:var(--fg-primary);display:flex;align-items:center;gap:8px;\"><span style=\"display:contents\"><i data-lucide=\"badge-check\" style=\"font-size:19px;color:#103D2C;\"><\u002Fi><\u002Fspan> Quality standards<\u002Fh4>\n                <ul style=\"margin:0;padding-left:20px;display:flex;flex-direction:column;gap:7px;\">\n                  <li>The NextLeap team has sole authority to disqualify posts found to be inappropriate, unprofessional or disrespectful.<\u002Fli>\n                  <li>Don't post copy-pasted content from NextLeap material or other sources. If you cite a source, give due credit.<\u002Fli>\n                  <li><strong style=\"color:var(--fg-primary);\">No plagiarism.<\u002Fstrong> Submissions copied from others' work are disqualified and community privileges revoked.<\u002Fli>\n                <\u002Ful>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"padding:16px 24px;border-top:1px solid var(--border);\">\n          <button onclick=\"{{ closeLipModal }}\" style=\"width:100%;font-weight:600;font-size:15px;padding:14px;border-radius:10px;border:none;background:#111;color:#fff;cursor:pointer;font-family:var(--font-body);\">Got it<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ hasModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;inset:0;background:rgba(20,20,20,.55);display:flex;align-items:center;justify-content:center;padding:30px;z-index:55;animation:overlayIn .2s ease;\">\n      <div style=\"background:#fff;border-radius:16px;width:100%;max-width:460px;overflow:hidden;animation:popIn .28s ease;\">\n        <div style=\"padding:34px 34px 26px;text-align:center;\">\n          <div style=\"{{ modalIconStyle }}\"><span style=\"display:contents\"><i data-lucide=\"{{ modal.icon }}\" style=\"font-size:40px;\"><\u002Fi><\u002Fspan><\u002Fdiv>\n          <div class=\"overline\" style=\"color:#0a7d41;margin:18px 0 8px;\">{{ modal.eyebrow }}<\u002Fdiv>\n          <h3 style=\"margin:0 0 12px;\">{{ modal.title }}<\u002Fh3>\n          <p style=\"col tomatically', 'We used 1 freeze on Day 14 — your streak is safe.');\n      }, 1000);\n    }\n  }\n  componentDidUpdate() { this._icons(); }\n  componentWillUnmount() { clearTimeout(this._t1); clearTimeout(this._tt); clearTimeout(this._hl); }\n\n  _icons() { try { window.lucide && window.lucide.createIcons(); } catch (e) {} }\n\n  showToast(icon, title, sub) {\n    clearTimeout(this._tt);\n    this.setState({ toast: { icon, title, sub } });\n    this._tt = setTimeout(() => this.setState({ toast: null }), 5400);\n  }\n\n  nav = (id) => {\n    const badges = { ...this.state.badges };\n    if (id === 'tasks') badges.tasks = false;\n    if (id === 'interview') badges.interview = false;\n    this.setState({ screen: id, drawerOpen: false, badges, highlight: null });\n    try { window.scrollTo(0, 0); } catch (e) {}\n  };\n\n  openRewards = () => this.setState({ drawerOpen: true });\n  closeRewards = () => this.setState({ drawerOpen: false });\n  dismissModal = () => this.setState({ modal: null });\n  dismissFreezeBanner = () => this.setState({ freezeBannerOpen: false });\n  closeToast = () => this.setState({ toast: null });\n  goPractice = () => this.nav('practice');\n  stop = (e) => { if (e && e.stopPropagation) e.stopPropagation(); };\n  setPracticeTab = (t) => this.setState({ practiceTab: t });\n  setInterviewTab = (t) => this.setState({ interviewTab: t });\n  setMilestoneTab = (t) => this.setState({ milestoneTab: t });\n  setLipTab = (t) => this.setState({ lipTab: t });\n  selectMilestone = (id) => this.setState({ selectedMilestone: id });\n  chooseFile = (id) => this.setState(st => ({ selectedMilestone: id, uploads: { ...st.uploads, [id]: 'Milestone-submission.pdf' } }));\n  saveMilestone = (label) => this.showToast('check', 'Saved', 'Your submission for ' + label + ' has been updated.');\n  onSaveAll = (id, label) => {\n    const url = (this.state.lipDraft[id] || '').trim();\n    const hasStaged = !!this.state.uploads[id];\n    this.setState(st => {\n      const next = { selectedMilestone: id };\n      const pe = { ...st.projEditing }; delete pe[id]; next.projEditing = pe;\n      if (hasStaged) next.projSubmitted = { ...st.projSubmitted, [id]: true };\n      if (url) { next.lipShared = { ...st.lipShared, [id]: true }; next.lipUrls = { ...st.lipUrls, [id]: url }; }\n      return next;\n    });\n    const parts = [];\n    if (hasStaged) parts.push('project');\n    if (url) parts.push('LinkedIn post');\n    const msg = parts.length ? ('Your ' + parts.join(' and ') + ' for ' + label + (parts.length > 1 ? ' have' : ' has') + ' been saved.') : ('Your submission for ' + label + ' has been updated.');\n    this.showToast('check', 'Saved', msg);\n  };\n  openLipModal = () => this.setState({ lipModalOpen: true });\n  closeLipModal = () => this.setState({ lipModalOpen: false });\n  setLipModalTab = (t) => this.setState({ lipModalTab: t });\n  onLipInput = (id, val) => this.setState(st => ({ lipDraft: { ...st.lipDraft, [id]: val } }));\n  submitLip = (id, label) => {\n    const url = (this.state.lipDraft[id] || '').trim();\n    if (!url) return;\n    this.setState(st => ({ selectedMilestone: id, lipShared: { ...st.lipShared, [id]: true }, lipUrls: { ...st.lipUrls, [id]: url } }));\n    this.showToast('check', 'Post linked to ' + label, \"Nice — your LinkedIn post counts toward your 10% scholarship.\");\n  };\n  unshareLip = (id) => this.setState(st => {\n    const ls = { ...st.lipShared }; delete ls[id];\n    return { selectedMilestone: id, lipShared: ls, lipDraft: { ...st.lipDraft, [id]: st.lipUrls[id] || '' } };\n  });\n  editProject = (id) => this.setState(st => ({ selectedMilestone: id, projEditing: { ...st.projEditing, [id]: true } }));\n\n  solveToday = () => {\n    const t = this.state.solvedUpTo + 1;\n    if (t > 50) return;\n    const patch = { solvedUpTo: t };\n    if (t === 30) {\n      patch.modal = { milestone: 30, eyebrow: '30-day streak reached', title: 'Advanced Content Module', body: \"We've added 2 bonus lessons to Your Tasks. You'll find them pinned at the top of the Your Tasks tab whenever you're ready.\", crumb: 'Your Tasks  ›  Advanced Content', target: 'tasks', cta: 'Take me to Your Tasks', icon: 'gift' };\n      patch.badges = { ...this.state.badges, tasks: true };\n    } else if (t === 40) {\n      patch.modal = { milestone: 40, eyebrow: '40-day streak reached', title: '2-month AI Mock Interviewer', body: 'Your 2-month AI Mock Interviewer access is now active. Find it under Career Services › Interview Preparation.', crumb: 'Career Services  ›  Interview Preparation', target: 'interview', cta: 'Open AI Interviewer', icon: 'bot' };\n      patch.badges = { ...this.state.badges, interview: true };\n    }\n    this.setState(patch);\n    if (t !== 30 && t !== 40) this.showToast('flame', 'Day ' + t + ' done · ' + t + '-day streak', 'Nice — come back tomorrow to keep it alive.');\n  };\n\n  modalCta = () => { const m = this.state.modal; if (m) this.claim(m.target); };\n\n  applyExtension = (label, due) => {\n    this.setState({ extensionApplied: true });\n    this.showToast('calendar-plus', '+1 day applied to ' + label, 'Deadline moved to ' + due + ' — remove it anytime before then.');\n  };\n  removeExtension = () => {\n    this.setState({ extensionApplied: false });\n    this.showToast('undo-2', 'Extension removed', \"It's back in My Rewards — apply it whenever you need the extra day.\");\n  };\n\n  claim = (target) => {\n    clearTimeout(this._hl);\n    if (target === 'tasks') {\n      this.setState({ screen: 'tasks', drawerOpen: false, modal: null, highlight: 'tasks', badges: { ...this.state.badges, tasks: false } });\n      this.showToast('gift', 'Your Advanced Content Modules are here', 'Pinned at the top of Your Tasks.');\n    } else if (target === 'interview') {\n      this.setState({ screen: 'interview', interviewTab: 'mock', drawerOpen: false, modal: null, highlight: 'interview', badges: { ...this.state.badges, interview: false } });\n      this.showToast('bot', 'AI Mock Interviewer is ready', \"It's the Mock Interview tab under Interview Preparation.\");\n    } else if (target === 'milestones') {\n      this.setState({ screen: 'milestones', milestoneTab: 'milestone', drawerOpen: false, modal: null, highlight: 'milestones' });\n      if (!this.state.extensionApplied) this.showToast('calendar-plus', 'Your +1 day extension is ready', 'Apply it to your next milestone whenever you need the extra time.');\n    } else {\n      this.setState({ screen: target, drawerOpen: false, modal: null });\n    }\n    try { window.scrollTo(0, 0); } catch (e) {}\n    this._hl = setTimeout(() => this.setState({ highlight: null }), 3200);\n  };\n\n  renderVals() {\n    const s = this.state;\n    const track = this.props.programTrack || 'Product Manager Fellowship';\n    const isBA = track.indexOf('Business') === 0;\n    const accent = isBA ? '#16233f' : '#103D2C';\n    const dates = isBA ? 'Apr 4 – Jul 31' : 'Jan 3 – Apr 30';\n    const showBadges = this.props.showNavBadges !== false;\n    const showNudge = this.props.showProactiveNudges !== false;\n\n    const navDefs = [\n      ['overview', 'Overview', 'layout-grid'],\n      ['tasks', 'Your Tasks', 'inbox'],\n      ['practice', 'Practice', 'square-terminal'],\n      ['announcement', 'Announcement', 'megaphone'],\n      ['calendar', 'Calendar & Recordings', 'calendar'],\n      ['milestones', 'Milestones & Final Project', 'clipboard-list'],\n      ['interview', 'Interview Preparation', 'video'],\n      ['career', 'Career Services', 'handshake'],\n      ['jobs', 'Jobs', 'briefcase'],\n      ['community', 'Community', 'users'],\n      ['certificates', 'My Certificates', 'award'],\n      ['refer', 'Refer & Earn', 'heart'],\n    ];\n    const projDoneIds = new Set(['m1', 'm2', ...Object.keys(s.projSubmitted)]);\n    const shareCount = [...projDoneIds].filter(id => !s.lipShared[id]).length;\n    const nav = navDefs.map(([id, label, icon]) => {\n      const active = s.screen === id;\n      const base = 'display:fl a(33,196,91,.35);' : '');\n    const extApplied = s.extensionApplied;\n    const mDefs = [\n      { id: 'm1', label: 'Milestone 1', title: 'System Thinking and Mapping Outcomes', due: '2 May', fullDue: 'May 2, 11:59 PM (Asia/Calcutta)', status: 'completed',\n        desc: 'Understand the market landscape, the goals and how to map business and product outcomes.',\n        sections: [\n          { heading: 'Understanding the market', paras: ['You have recently joined the ChatGPT India mobile team. In your first week, your manager hands you a project: increase the usage of voice input on the ChatGPT mobile app.', 'Voice input is available, but very few users in India use it. Your manager believes it could be powerful in a mobile-first country — your first task is to understand the landscape and figure out why adoption is low.'] },\n          { heading: 'What to submit', bullets: ['Map voice-input usage trends in India across comparable apps (Google Assistant, WhatsApp voice notes, Alexa).', 'Analyse where voice input is surfaced in ChatGPT mobile today — is it discoverable and contextual?', 'Identify 2–3 analogous products and how they integrate voice.', 'Outline why higher voice usage could be valuable, with potential product outcomes.'] },\n        ] },\n      { id: 'm2', label: 'Milestone 2', title: 'User Research & Problem Framing', due: '23 May', fullDue: 'May 23, 11:59 PM (Asia/Calcutta)', status: 'completed',\n        desc: 'Segment users, carry out user research and derive insights to frame the problem.',\n        sections: [\n          { heading: 'Frame the problem', paras: ['Building on your market understanding, design and run lightweight user research to learn why voice-input adoption is low and which user segments stand to benefit most.'] },\n          { heading: 'What to submit', bullets: ['Define 2–3 user segments and their goals.', 'Run 4–5 user interviews and synthesise the key insights.', 'Write a sharp, evidence-backed problem statement.', 'List the
