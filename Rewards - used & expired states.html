document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

(--bg-default);\n  color: var(--fg-primary);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-feature-settings: \"liga\" off;\n  margin: 0;\n}\nh5, h6 { font-family: var(--font-body); font-weight: 400; margin: 0; }\n\nh1 { font-size: var(--h1-size); line-height: var(--h1-lh); letter-spacing: var(--h1-ls); }\nh2 { font-size: var(--h2-size); line-height: var(--h2-lh); letter-spacing: var(--h2-ls); }\nh3 { font-size: var(--h3-size); line-height: var(--h3-lh); letter-spacing: var(--h3-ls); }\nh4 { font-size: var(--h4-size); line-height: var(--h4-lh); letter-spacing: var(--h4-ls); }\nh5 { font-size: var(--h5-size); line-height: var(--h5-lh); letter-spacing: var(--h5-ls); }\nh6 { font-size: var(--h6-size); line-height: var(--h6-lh); letter-spacing: var(--h6-ls); }\n\np, .body1 { font: 400 var(--body1-size)/var(--body1-lh) var(--font-body); letter-spacing: var(--body1-ls); margin: 0; }\n.body2    { font: 400 var(--body2-size)/var(--body2-lh) var(--font-body); letter-spacing: var(--body2-ls); }\n.caption  { font: 400 var(--caption-size)/var(--caption-lh) var(--font-body); }\n.overline { font: 400 var(--overline-size)/var(--overline-lh) var(--font-body); text-transform: uppercase; letter-spacing: 1px; }\n.tag      { font: 400 var(--tag-size)/var(--tag-lh) var(--font-body); }\n\ncode, pre { font-family: var(--font-mono); }\n\n/* Marketing / hero scale — use on landing pages */\n.display-1 { font: 400 72px/100% var(--font-display); letter-spacing: -8.7px; }\n.display-2 { font: 400 54px/100% var(--font-display); letter-spacing: -6.2px; }\n.display-3 { font: 400 40px/100% var(--font-display); letter-spacing: -4px; }\n\n/* Buttons */\n.btn {\n  font: 500 var(--btn-lg-size)/var(--btn-lg-lh) var(--font-body);\n  letter-spacing: var(--btn-lg-ls);\n  padding: 12px 20px;\n  border-radius: var(--radius);\n  cursor: pointer;\n  border: none;\n  display: inline-flex; ali         #ffffff;\n  --bg-card:         #ffffff;\n  --bg-overlay:      rgba(203,203,203,0.80);\n\n  /* ---------- Foreground / Text (Light) ---------- */\n  --fg-primary:    rgba(0,0,0,0.96);\n  --fg-secondary:  rgba(0,0,0,0.75);\n  --fg-tertiary:   rgba(0,0,0,0.60);\n  --fg-disabled:   rgba(0,0,0,0.40);\n  --fg-on-dark:    rgba(255,255,255,1);\n\n  /* ---------- Borders / Dividers ---------- */\n  --border:       #E5E5E5;\n  --separator:    #000000;\n  --divider:      rgba(26,26,26,0.10);\n\n  /* ---------- Brand & CTAs ---------- */\n  --cta-primary-bg:   #21c45b;    /* NextLeap green */\n  --cta-primary-fg:   #ffffff;\n  --cta-secondary-bg: #0c0c0c;    /* Near-black */\n  --cta-secondary-fg: #ffffff;\n\n  --brand-green:        #21c45b;  /* primary */\n  --brand-green-bright: #2af773;  /* dark-mode accent, also \"primary_green\" in light */\n  --brand-green-text:   #0a7d41;  /* accessible green-on-white */\n  --brand-green-tint:   #005353;\n\n  /* ---------- Semantic / iOS-like accents (Light) ---------- */\n  --c-green:  #34c759;\n  --c-yellow: #ffcc00;\n  --c-red:    #ff3b30;\n  --c-orange: #ff9500;\n  --c-sky:    #48a3f7;\n  --c-blue:   #007aff;\n  --c-pink:   #ff2d55;\n  --c-lilac:  #af52de;\n  --c-rose:   #f36b83;\n  --c-teal:   #21d3f3;\n\n  /* ---------- Warm neutrals (imagery / mast-head fills) ---------- */\n  --c-almond: #FCE7CF;\n  --c-cream:  #FEF3E7;\n\n  /* ---------- Tag palette (Light) ---------- */\n  --tag-green:      #96D9A7;\n  --tag-yellow:     #FFE561;\n  --tag-red:        #FBA5A0;\n  --tag-orange:     #FFBC53;\n  --tag-blue:       #86C2FF;\n  --tag-pink:       #F4AAFB;\n  --tag-purple:     #CAA9FF;\n  --tag-light-blue: #8DDDEB;\n\n  /* Soft course-card tag bg from odin */\n  --tag-soft-green: #d0eabe;\n  --tag-soft-cream: #fefaf1; /* wall of praise bg */\n\n  /* Marketing-specific: used on dark BGs */\n  --marketing-green: #408B6C;\n\n  /* ---------- Radii / shadows / spacing ---------- */\n  --radius-sm: 4px;\n  --radius:    8px;           /* canonical — cards, buttons, inputs */\n  --radius-lg: 12px;\n  --radius-pill: 100px;\n\n  --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);\n  --shadow:    0 2px 8px rgba(0,0,0,0.08);\n  --shadow-lg: 0 10px 40px -10px rgba(0,0,0,0.20);\n  --shadow-glow-green: 0 10px 40px -10px #2af77355;\n\n  /* Content gutters */\n  --gutter-desktop: 64px;\n  --gutter-mobile:  24px;\n  --max-content:    1200px;\n\n  /* ---------- Semantic typography tokens (Default / App-side, desktop) ---------- */\n  --h1-size: 42px;   --h1-lh: 114%; --h1-ls: -3.35px;\n  --h2-size: 35px;   --h2-lh: 120%; --h2-ls: -2.8px;\n  --h3-size: 30px;   --h3-lh: 125%; --h3-ls: -2.5px;\n  --h4-size: 22px;   --h4-lh: 128%; --h4-ls: -2.25px;\n  --h5-size: 19px;   --h5-lh: 145%; --h5-ls: 0.15px;\n  --h6-size: 19px;   --h6-lh: 145%; --h6-ls: 0.15px;\n\n  --body1-size: 17px; --body1-lh: 160%; --body1-ls: 0.25px;\n  --body2-size: 15px; --body2-lh: 160%; --body2-ls: 0.25px;\n  --caption-size: 13px; --caption-lh: 150%;\n  --overline-size: 11px; --overline-lh: 100%;\n  --tag-size: 12px; --tag-lh: 110%;\n\n  --btn-lg-size: 17px;  --btn-lg-lh: 118%; --btn-lg-ls: 0.5px;\n  --btn-sm-size: 15px;  --btn-sm-lh: 134%; --btn-sm-ls: 0.25px;\n}\n\n/* ================= Dark theme ==================== */\n[data-theme=\"dark\"], .theme-dark {\n  --bg-default:    #0c0c0c;\n  --bg-primary:    #0c0c0c;\n  --bg-secondary:  #141414;\n  --bg-tertiary:   #1f1f1f;\n  --bg-quaternary: rgba(255,255,255,0.30);\n  --bg-quaternary-light: rgba(255,255,255,0.05);\n  --bg-input:      #2e2e2e;\n  --bg-card:       #1f1f1f;\n  --bg-overlay:    rgba(40,40,40,0.90);\n\n  --fg-primary:    rgba(255,255,255,1);\n  --fg-secondary:  rgba(255,255,255,0.75);\n  --fg-tertiary:   rgba(255,255,255,0.60);\n  --fg-disabled:   rgba(255,255,255,0.40);\n  --fg-on-dark:    rgba(255,255,255,1);\n\n  --border:     rgba(255,255,255,0.10);\n  --separator:  rgba(255,255,255,0.10);\n  --divider:    rgba(255,255,255,0.10);\n\n  --cta-primary-bg:   #2af773;\n  --cta-primary-fg:   rgba(0,0,0,0.96);\n  --cta-secondary-bg: #ffffff;\n  --cta-secondary-fg: rgba(0,0,0,0.96);\n\n  --brand-green-text: #2af773;\n\n  /* iOS-like accents shift for dark */\n  --c-green:  #30d158;\n  --c-yellow: #ffd60a;\n  --c-red:    #ff453a;\n  --c-orange: #ff9f0a;\n  --c-sky:    #61aff7;\n  --c-blue:   #0a84ff;\n  --c-pink:   #ff375f;\n  --c-lilac:  #bf5af2;\n\n  --c-almond: #544845;\n  --c-cream:  #73635F;\n\n  --tag-green:      #42764F;\n  --tag-yellow:     #E1BC00;\n  --tag-red:        #8F2620;\n  --tag-orange:     #CA8519;\n  --tag-blue:       #094887;\n  --tag-pink:       #861F70;\n  --tag-purple:     #601F80;\n  --tag-light-blue: #008299;\n\n  --marketing-green: #B5E09B;\n}\n\n/* ================= Base / semantic element styles ================ */\nhtml { font-size: 17px; }\nbody {\n  margin: 0;\n  font-family: var(--font-body);\n  background: var(--bg-default);\n  color: var(--fg-primary);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\nh1, h2, h3, h4 {\n  font-family: var(--font-display);\n  font-weight: 400;\n  font-feature-settings: \"liga\" off;\n  margin: 0;\n}\nh5, h6 { font-family: var(--font-body); font-weight: 400; margin: 0; }\n\nh1 { font-size: var(--h1-size); line-height: var(--h1-lh); letter-spacing: var(--h1-ls); }\nh2 { font-size: var(--h2-size); line-height: var(--h2-lh); letter-spacing: var(--h2-ls); }\nh3 { font-size: var(--h3-size); line-height: var(--h3-lh); letter-spacing: var(--h3-ls); }\nh4 { font-size: var(--h4-size); line-height: var(--h4-lh); letter-spacing: var(--h4-ls); }\nh5 { font-size: var(--h5-size); line-height: var(--h5-lh); letter-spacing: var(--h5-ls); }\nh6 { font-size: var(--h6-size); line-height: var(--h6-lh); letter-spacing: var(--h6-ls); }\n\np, .body1 { font: 400 var(--body1-size)/var(--body1-lh) var(--font-body); letter-spacing: var(--body1-ls); margin: 0; }\n.body2    { font: 400 var(--body2-size)/var(--body2-lh) var(--font-body); letter-spacing: var(--body2-ls); }\n.caption  { font: 400 var(--caption-size)/var(--caption-lh) var(--font-body); }\n.overline { font: 400 var(--overline-size)/var(--overline-lh) var(--font-body); text-transform: uppercase; letter-spacing: 1px; }\n.tag      { font: 400 var(--tag-size)/var(--tag-lh) var(--font-body); }\n\ncode, pre { font-family: var(--font-mono); }\n\n/* Marketing / hero scale — use on landing pages */\n.display-1 { font: 400 72px/100% var(--font-display); letter-spacing: -8.7px; }\n.display-2 { font: 400 54px/100% var(--font-display); letter-spacing: -6.2px; }\n.display-3 { font: 400 40px/100% var(--font-display); letter-spacing: -4px; }\n\n/* Buttons */\n.btn {\n  font: 500 var(--btn-lg-size)/var(--btn-lg-lh) var(--font-body);\n  letter-spacing: var(--btn-lg-ls);\n  padding: 12px 20px;\n  border-radius: var(--radius);\n  cursor: pointer;\n  border: none;\n  display: inline-flex; align-items: center; gap: 8px;\n  transition: opacity 120ms ease, transform 120ms ease, background-color 120ms ease;\n}\n.btn:hover { opacity: 0.92; }\n.btn:active { transform: scale(0.98); }\n.btn-primary   { background: var(--cta-primary-bg); color: var(--cta-primary-fg); }\n.btn-secondary { background: var(--cta-secondary-bg); color: var(--cta-secondary-fg); }\n.btn-outline   { background: transparent; color: var(--fg-primary); border: 1px solid var(--fg-primary); }\n.btn-small     { font-size: var(--btn-sm-size); line-height: var(--btn-sm-lh); letter-spacing: var(--btn-sm-ls); padding: 8px 14px; }\n\n/* Mobile scale overrides */\n@media (max-width: 768px) {\n  :root {\n    --h1-size: 31px; --h1-ls: -3.35px; --h1-lh: 110%;\n    --h2-size: 27px; --h2-ls: -2.8px;  --h2-lh: 114%;\n    --h3-size: 24px; --h3-ls: -2px;    --h3-lh: 118%;\n    --h4-size: 22px; --h4-ls: -2px;\n    --gutter-desktop: 24px;\n  }\n  .display-1 { font-size: 42px; letter-spacing: -5px; }\n  .display-2 { font-size: 35px; letter-spacing: -4.1px; }\n  .display-3 { font-size: 29px; letter-spacing: -3px; }\n}\n<\u002Fstyle>\n  <script src=\"72926398-2b42-4584-8661-22b34a29e0c9\"><\u002Fscript>\n  <script src=\"bba78c10-4754-44bb-95f1-598e58a9ff1b\"><\u002Fscript>\n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;background:#f1f1f1;}\n    svg[class*=\"lucide\"]{width:1em;height:1em;stroke-width:2;}\n    button,input{font-family:var(--font-body);}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;padding:44px 24px 80px;display:flex;flex-direction:column;align-items:center;gap:22px;font-family:var(--font-body);color:var(--fg-primary);\">\n\n  <div style=\"width:100%;max-width:730px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n    <div>\n      <div style=\"font-size:12px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--fg-tertiary);margin-bottom:6px;\">Rewards · state variants<\u002Fdiv>\n      <h3 style=\"margin:0;font-size:26px;line-height:1.2;\">My Rewards — used &amp; expired<\u002Fh3>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:5px;background:#e6e6e6;border-radius:9px;padding:5px;\">\n      <button onclick=\"{{ goActive }}\" style=\"{{ segActive }}\">Active<\u002Fbutton>\n      <button onclick=\"{{ goUsed }}\" style=\"{{ segUsed }}\">Used &amp; expired<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#fff;border-radius:14px;width:100%;max-width:730px;border:1px solid var(--border);overflow:hidden;\">\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;padding:24px 28px 16px;border-bottom:1px solid var(--border);\">\n      <h4 style=\"margin:0;\">My Rewards<\u002Fh4>\n      <button style=\"border:1px solid var(--border);background:#fff;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex:none;\"><span style=\"display:contents\"><i data-lucide=\"x\" style=\"font-size:18px;\"><\u002Fi><\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"padding:20px 28px 28px;display:flex;flex-direction:column;gap:26px;\">\n\n      <div>\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;\">\n          <h4 style=\"margin:0;\">Exclusive access<\u002Fh4>\n          <span style=\"font-size:13px;color:var(--fg-tertiary);\">{{ exclusiveSubtitle }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:14px;\">\n          <sc-for list=\"{{ exclusiveRewards }}\" as=\"r\" hint-placeholder-count=\"2\">\n            <div style=\"{{ r.cardStyle }}\">\n              <div style=\"{{ r.iconStyle }}\"><span style=\"display:contents\"><i data-lucide=\"{{ r.icon }}\" style=\"font-size:24px;\"><\u002Fi><\u002Fspan><\u002Fdiv>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap;\">\n                  <span style=\"{{ r.titleStyle }}\">{{ r.title }}<\u002Fspan>\n                  <span style=\"{{ r.statusStyle }}\"><span style=\"display:contents\"><i data-lucide=\"{{ r.statusIcon }}\" style=\"font-size:13px;\"><\u002Fi><\u002Fspan> {{ r.status }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"color:var(--fg-tertiary);font-size:14px;line-height:1.45;margin-bottom:9px;\">{{ r.note }}<\u002Fdiv>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-secondary);background:#f5f5f5;padding:5px 11px;border-radius:100px;\"><span style=\"display:contents\"><i data-lucide=\"map-pin\" style=\"font-size:13px;flex:none;\"><\u002Fi><\u002Fspan>{{ r.loc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:none;\">{{ r.rightEl }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid var(--border);padding-top:22px;\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px;\">\n          <h4 style=\"margin:0;\">Applied automatically<\u002Fh4>\n          <span style=\"font-size:13px;color:var(--fg-tertiary);\">{{ autoSubtitle }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px;margin-top:14px;\">\n          <sc-for list=\"{{ autoRewards }}\" as=\"r\" hint-placeholder-count=\"2\">\n            <div style=\"{{ r.cardStyle }}\">\n              <div style=\"{{ r.iconStyle }}\"><span style=\"display:contents\"><i data-lucide=\"{{ r.icon }}\" style=\"font-size:24px;\"><\u002Fi><\u002Fspan><\u002Fdiv>\n              <div style=\"flex:1;min-width:0;\">\n                <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;flex-wrap:wrap;\">\n                  <span style=\"{{ r.titleStyle }}\">{{ r.title }}<\u002Fspan>\n                  <span style=\"{{ r.statusStyle }}\"><span style=\"display:contents\"><i data-lucide=\"{{ r.statusIcon }}\" style=\"font-size:13px;\"><\u002Fi><\u002Fspan> {{ r.status }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"color:var(--fg-tertiary);font-size:14px;line-height:1.45;margin-bottom:9px;\">{{ r.note }}<\u002Fdiv>\n                <div style=\"display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--fg-secondary);background:#f5f5f5;padding:5px 11px;border-radius:100px;\"><span style=\"display:contents\"><i data-lucide=\"map-pin\" style=\"font-size:13px;flex:none;\"><\u002Fi><\u002Fspan>{{ r.loc }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:none;\">{{ r.rightEl }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"width:100%;max-width:730px;display:flex;align-items:flex-start;gap:9px;color:var(--fg-tertiary);font-size:13px;line-height:1.5;\">\n    <span style=\"display:contents\"><i data-lucide=\"info\" style=\"font-size:16px;flex:none;margin-top:2px;\"><\u002Fi><\u002Fspan>\n    <div>{{ footnote }}<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'used' };\n  componentDidMount() { this._icons(); this._iconRetries = 0; this._pollIcons(); }\n  componentDidUpdate() { this._icons(); }\n  _icons() { try { window.lucide && window.lucide.createIcons(); } catch (e) {} }\n  _pollIcons() {\n    const left = document.querySelectorAll('i[data-lucide]').length;\n    if (left > 0 && this._iconRetries < 40) {\n      this._iconRetries++;\n      this._icons();\n      setTimeout(() => this._pollIcons(), 100);\n    }\n  }\n  goActive = () => this.setState({ view: 'active' });\n  goUsed = () => this.setState({ view: 'used' });\n\n  renderVals() {\n    const React = this.constructor.React || window.React;\n    const isUsed = this.state.view === 'used';\n\n    const pill = (bg, c) => 'display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600;white-space:nowrap;background:' + bg + ';color:' + c + ';';\n    const iconTile = (bg, c) => 'flex:none;width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:' + bg + ';color:' + c + ';';\n    const activeCard = 'display:flex;gap:16px;align-items:center;border:1px solid var(--border);border-radius:10px;padding:16px 18px;background:#fff;';\n    const usedCard = 'display:flex;gap:16px;align-items:center;border:1px solid var(--border);border-radius:10px;padding:16px 18px;background:#fafafa;';\n    const titleActive = 'font-weight:600;font-size:16px;color:var(--fg-primary);';\n    const titleUsed = 'font-weight:600;font-size:16px;color:var(--fg-secondary);';\n\n    // right-side elements\n    const ctaEl = (label) => React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: '6px', fontWeight: 600, fontSize: '14px', color: '#111', whiteSpace: 'nowrap' } },\n      label, React.createElement('span', { style: { display: 'contents' } }, React.createElement('i', { 'data-lucide': 'arrow-right', style: { fontSize: '16px' } })));\n    const autoTagEl = React.createElement('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '6px', fontSize: '12px', color: 'var(--fg-tertiary)', border: '1px solid var(--border)', padding: '8px 12px', borderRadius: '8px', whiteSpace: 'nowrap', background: '#fff' } },\n      React.createElement('span', { style: { display: 'contents' } }, React.createElement('i', { 'data-lucide': 'zap', style: { fontSize: '13px' } })), ' Automatic');\n    const metaEl = (icon, text) => React.createElement('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '6px', fontSize: '12px', color: 'var(--fg-tertiary)', whiteSpace: 'nowrap' } },\n      React.createElement('span', { style: { display: 'contents' } }, React.createElement('i', { 'data-lucide': icon, style: { fontSize: '14px' } })), text);\n\n    // base defs with active + used variants\n    const defs = [\n      { id: 'adv', icon: 'gift', section: 'exclusive',\n        active: { status: 'Unlocked · 1', statusIcon: 'sparkles', sk: pill('#e7f7ee', '#0a7d41'), note: 'One advanced content module added to your task list as you build your streak.', ib: '#e7f7ee', ic: '#0a7d41', right: ctaEl('Open in Your Tasks') },\n        used: { status: 'Completed', statusIcon: 'check', sk: pill('#eef3ef', '#103D2C'), note: \"You've finished this module — it stays in Your Tasks if you want to revisit it.\", ib: '#f0f0f0', ic: 'var(--fg-tertiary)', right: metaEl('history', 'Finished Apr 20') },\n        loc: 'Your Tasks', title: 'Advanced Content Module' },\n      { id: 'ai', icon: 'bot', section: 'exclusive',\n        active: { status: 'Active · 57 days left', statusIcon: 'circle-check', sk: pill('#e7f7ee', '#0a7d41'), note: 'Two months of AI mock interviews with instant, structured feedback.', ib: '#e7f7ee', ic: '#0a7d41', right: ctaEl('Open AI Interviewer') },\n        used: { status: 'Expired', statusIcon: 'circle-alert', sk: pill('#fdeaea', '#c2382f'), note: 'Your 2-month AI Mock Interviewer access window has ended.', ib: '#f0f0f0', ic: 'var(--fg-tertiary)', right: metaEl('calendar-x', 'Ended May 12') },\n        loc: 'Career Services › Interview Preparation', title: '2-month AI Mock Interviewer' },\n      { id: 'extra', icon: 'calendar-plus', section: 'auto',\n        active: { status: 'Applied · +1 day', statusIcon: 'check', sk: pill('#e7f7ee', '#0a7d41'), note: \"Automatically added to your next milestone deadline — you don't need to do anything.\", ib: '#e7f7ee', ic: '#0a7d41', right: autoTagEl },\n        used: { status: 'Used', statusIcon: 'check-check', sk: pill('#f0f0f0', 'var(--fg-tertiary)'), note: 'You used your +1 day extension on Milestone 3. It has now been spent.', ib: '#f0f0f0', ic: 'var(--fg-tertiary)', right: metaEl('history', 'Milestone 3') },\n        loc: 'Milestones & Final Project', title: 'Extra day for your next milestone' },\n      { id: 'freeze', icon: 'snowflake', section: 'auto',\n        active: { status: '2 ready', statusIcon: 'zap', sk: pill('#e9f1fc', '#1f6fc2'), note: \"Applied automatically when you miss a day — you don't need to do anything. Your streak stays safe.\", ib: '#e6f1fc', ic: '#2f7fd1', right: autoTagEl },\n        used: { status: '0 left', statusIcon: 'check-check', sk: pill('#f0f0f0', 'var(--fg-tertiary)'), note: 'Both streak freezes have been used to protect your streak.', ib: '#f0f0f0', ic: 'var(--fg-tertiary)', right: metaEl('history', 'Used Apr 8 & May 2') },\n        loc: 'Streak calendar', title: 'Streak Freeze' },\n    ];\n\n    const build = (d) => {\n      const v = isUsed ? d.used : d.active;\n      return {\n        icon: d.icon, title: d.title, loc: d.loc,\n        status: v.status, statusIcon: v.statusIcon, statusStyle: v.sk, note: v.note,\n        titleStyle: isUsed ? titleUsed : titleActive,\n        iconStyle: iconTile(v.ib, v.ic),\n        cardStyle: isUsed ? usedCard : activeCard,\n        rightEl: v.right,\n      };\n    };\n\n    const seg = (active) => 'padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;font-family:var(--font-body);' + (active ? 'background:#fff;color:var(--fg-primary);box-shadow:0 1px 3px rgba(0,0,0,.12);' : 'background:transparent;color:var(--fg-tertiary);');\n\n    return {\n      goActive: this.goActive, goUsed: this.goUsed,\n      segActive: seg(!isUsed), segUsed: seg(isUsed),\n      exclusiveRewards: defs.filter(d => d.section === 'exclusive').map(build),\n      autoRewards: defs.filter(d => d.section === 'auto').map(build),\n      exclusiveSubtitle: isUsed ? 'No longer available' : 'Tap to go use them',\n      autoSubtitle: isUsed ? 'Already used' : 'No action needed',\n      footnote: isUsed\n        ? 'Used and expired rewards stay listed for reference. They turn grey with a Used, Completed or Expired tag and drop their action button — nothing here is clickable.'\n        : 'Rewards you can still act on. Exclusive-access rewards show a button to open them; automatic rewards apply on their own.',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
